<!DOCTYPE html>
<html>
<head>
<style>

/* Element Selector
   Selects all <p> tags */
p{
    color: blue; /* paragraph text color */
}

/* ID Selector
   Selects one unique element with id="box"
   # symbol is used for id */
#box{
    color: red; /* heading text color */
}

/* Class Selector
   Selects elements with class="btn"
   . symbol is used for class */
.btn{
    background: green; /* button background color */
    color: white;      /* button text color */
}

/* Group Selector
   Styles multiple tags together */
h1,p{
    font-family: Arial; /* change font style */
}

/* Universal Selector
   Selects all elements in page */
*{
    margin: 0;   /* remove outer space */
    padding: 0;  /* remove inner space */
}

</style>
</head>
<body>

<!-- h1 heading with id selector -->
<h1 id="box">Welcome</h1>

<!-- paragraph with element selector -->
<p>Hello</p>

<!-- button with class selector -->
<button class="btn">Click</button>

</body>
</html>
