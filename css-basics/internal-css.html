<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS</title>

    <!-- 
        Internal CSS means writing CSS inside the same HTML file
        using the <style> tag.
        It is usually written inside the <head> section.
        It can style the whole webpage.
    -->

    <style>

        /* body means full webpage area */
        body{
            background-color: lightgray; 
            /* background-color means page background color */
        }

        /* h1 means heading tag */
        h1{
            color: blue;             
            /* color means text color */

            text-align: center;      
            /* text-align means text position
               center = center side
               left = left side
               right = right side */
        }

        /* p means paragraph tag */
        p{
            color: green;            
            /* paragraph text color */

            font-size: 20px;        
            /* font-size means text size */
        }

        /* button means button tag */
        button{
            background-color: red;  
            /* button background color */

            color: white;          
            /* button text color */

            padding: 10px;         
            /* padding means inside space
               space between text and border */

        }

    </style>

</head>
<body>

    <!-- Heading -->
    <h1>Welcome</h1>

    <!-- Paragraph -->
    <p>This page uses Internal CSS.</p>

    <!-- Button -->
    <button>Click Me</button>

</body>
</html>
