<!DOCTYPE html>
<html>
<head>
    <title>External CSS</title>

    <!-- Link HTML file with CSS file -->
    <link rel="stylesheet" href="style.css">

</head>
<!--  What is External CSS?

External CSS means writing CSS in a separate file with .css extension and linking it to the HTML file.

 HTML file = structure
 CSS file = design

 Best and professional method. -->

<body>

    <h1>Welcome</h1>

    <p>This page uses External CSS.</p>

    <button>Click Me</button>

</body>
</html>
