<!DOCTYPE html>
<html>
<head>
<style>

/* body means full webpage */
body{
    background: lightgray; 
    /* page background color */
}

/* h1 heading styles */
h1{
    color: red;
    /* color means text color */

    text-align: center;
    /* text-align means text position
       center = middle */
}

/* paragraph styles */
p{
    color: blue;
    /* paragraph text color */

    font-size: 20px;
    /* font-size means text size */

    font-weight: bold;
    /* font-weight means text thickness
       bold = dark/thick text */
}

/* div box styles */
.box{
    background: yellow;
    /* background means element background color */

    text-align: center;

    font-size: 18px;
}

</style>
</head>
<body>

<h1>Welcome</h1>

<p>This is paragraph text.</p>

<div class="box">
    Background Color Example
</div>

</body>
</html>
