<!DOCTYPE html>
<html>
<head>
<style>

/* parent container */
.container{
    display: grid;
    /* enable grid */

    grid-template-columns: 1fr 1fr;
    /* creates 2 equal columns */

    gap: 10px;
    /* space between boxes */

    background: lightgray;
    padding: 10px;
}

/* child items */
.box{
    background: blue;
    color: white;
    padding: 20px;
    text-align: center;
}

/* make one item wide */
.item1{
    grid-column: 1 / 3;
    /* span from column 1 to 3 */
}

</style>
</head>
<body>

<div class="container">
    <div class="box item1">Wide Box</div>
    <div class="box">2</div>
    <div class="box">3</div>
    <div class="box">4</div>
</div>

</body>
</html>
