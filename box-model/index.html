<!DOCTYPE html>
<html>
<head>
<style>

/* box class means container */
.box{

    width: 200px;
    /* width means box horizontal size */

    height: 100px;
    /* height means box vertical size */

    padding: 10px;
    /* padding means inside space
       between text and border */

    border: 2px solid black;
    /* border means line around box
       2px = thickness
       solid = line style
       black = color */

    margin: 20px;
    /* margin means outside space
       distance from other elements */

    background: lightblue;
}

</style>
</head>
<body>

<div class="box">
    Hello Box Model
</div>

</body>
</html>
